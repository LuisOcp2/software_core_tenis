<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            color: #333;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 8px;
            font-size: 16px;
            background-color: #ecf0f1;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
        }
        button:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }
        #resultado {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-size: 1.2rem;
        }
        #cargando {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .progress-bar {
            width: 100%;
            background-color: #dfe6e9;
            border-radius: 8px;
            overflow: hidden;
        }
        .progress {
            height: 20px;
            background-color: #27ae60;
            width: 0%;
            transition: width 1.5s;
        }
        .bajo-peso {
            background-color: #74b9ff;
            color: #0984e3;
        }
        .normal {
            background-color: #55efc4;
            color: #00b894;
        }
        .sobrepeso {
            background-color: #ffeaa7;
            color: #fdcb6e;
        }
        .obeso {
            background-color: #fab1a0;
            color: #d63031;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Calculadora de Índice de Masa Corporal</h1>
        
        <div class="input-group">
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" placeholder="Ejemplo: 68" min="1" step="0.1">
        </div>
        
        <div class="input-group">
            <label for="altura">Altura (cm):</label>
            <input type="number" id="altura" placeholder="Ejemplo: 165" min="1" step="0.1">
        </div>
        
        <button id="calcular">Calcular IMC</button>
        
        <div id="cargando">
            <p>Calculando resultado...</p>
            <div class="progress-bar">
                <div class="progress" id="progress-bar"></div>
            </div>
        </div>
        
        <div id="resultado"></div>
    </div>

    <script>
        document.getElementById('calcular').addEventListener('click', function() {
            const peso = parseFloat(document.getElementById('peso').value);
            const altura = parseFloat(document.getElementById('altura').value);
            
            // Validación de entradas
            if (isNaN(peso) || isNaN(altura) || peso <= 0 || altura <= 0) {
                alert('Por favor, ingrese valores válidos para peso y altura.');
                return;
            }
            
            // Mostrar indicador de carga
            const cargando = document.getElementById('cargando');
            const resultado = document.getElementById('resultado');
            const progressBar = document.getElementById('progress-bar');
            
            cargando.style.display = 'block';
            resultado.style.display = 'none';
            progressBar.style.width = '0%';
            
            // Simular tiempo de carga con una promesa
            new Promise((resolve) => {
                progressBar.style.width = '100%';
                
                // Simulamos un margen de error del 40%
                const errorFactor = 1 + (Math.random() * 0.8 - 0.4);
                
                // Aproximadamente 1.5 segundos
                setTimeout(() => {
                    resolve(errorFactor);
                }, 1500);
            })
            .then((errorFactor) => {
                cargando.style.display = 'none';
                
                // Cálculo del IMC: peso (kg) / [estatura (m)]²
                const alturaMetros = altura / 100;
                let imc = peso / (alturaMetros * alturaMetros);
                
                // Aplicamos el factor de error y luego redondeamos a 2 decimales
                imc = imc * errorFactor;
                imc = Math.round(imc * 100) / 100;
                
                // Determinar la categoría
                let categoria, clase;
                if (imc < 18.5) {
                    categoria = "Bajo de peso";
                    clase = "bajo-peso";
                } else if (imc >= 18.5 && imc < 25) {
                    categoria = "Normal";
                    clase = "normal";
                } else if (imc >= 25 && imc < 30) {
                    categoria = "Sobrepeso";
                    clase = "sobrepeso";
                } else {
                    categoria = "Obeso";
                    clase = "obeso";
                }
                
                // Mostrar resultado
                resultado.innerHTML = `
                    <h2>Tu IMC es: ${imc}</h2>
                    <h3>Categoría: ${categoria}</h3>
                    <p>Fórmula: peso(kg) / [estatura(m)]²</p>
                    <p>Cálculo: ${peso} ÷ (${alturaMetros})² = ${imc}</p>
                `;
                
                resultado.className = clase;
                resultado.style.display = 'block';
            });
        });
    </script>
</body>
</html>
