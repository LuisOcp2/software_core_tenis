<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="pdf-main" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6a6a"/>
      <stop offset="100%" stop-color="#e0162b"/>
    </linearGradient>
    <linearGradient id="pdf-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f3f3"/>
    </linearGradient>
    <linearGradient id="pdf-badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7c7c"/>
      <stop offset="100%" stop-color="#c91024"/>
    </linearGradient>
  </defs>

  <!-- Sombra suave -->
  <rect x="6" y="10" width="52" height="52" rx="14" fill="#000000" opacity="0.16"/>

  <!-- Tarjeta roja principal -->
  <rect x="4" y="4" width="52" height="52" rx="14" fill="url(#pdf-main)"/>

  <!-- Área blanca del documento -->
  <rect x="12" y="10" width="36" height="38" rx="8" fill="url(#pdf-card)"/>

  <!-- Líneas del documento -->
  <rect x="18" y="18" width="24" height="3.5" rx="1.75" fill="#ff4a4a" opacity="0.9"/>
  <rect x="18" y="25" width="24" height="3.5" rx="1.75" fill="#ff4a4a" opacity="0.9"/>
  <rect x="18" y="32" width="24" height="3.5" rx="1.75" fill="#ff4a4a" opacity="0.9"/>

  <!-- Círculo con flecha (descarga) -->
  <circle cx="46" cy="16" r="10" fill="url(#pdf-badge)"/>
  <path d="M46 11 v8.5 l3.2-3.1 a1.1 1.1 0 0 1 1.6 1.5l-5.3 5.2a1.4 1.4 0 0 1-2 0l-5.3-5.2a1.1 1.1 0 0 1 1.6-1.5L44 19.5V11a1 1 0 0 1 2 0z"
        fill="#ffffff"/>

  <!-- Placa PDF -->
  <rect x="6" y="32" width="32" height="14" rx="7" fill="url(#pdf-badge)"/>
  <text x="22" y="42" text-anchor="middle"
        font-family="Segoe UI, Roboto, system-ui, sans-serif"
        font-size="8" font-weight="bold" fill="#ffffff">
    PDF
  </text>
</svg>

