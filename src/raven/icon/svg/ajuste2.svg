<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fondo suave estilo iOS -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#D7DCE8"/>
    </linearGradient>

    <!-- Sombra suave del contenedor -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset in="blur" dx="0" dy="4" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Degradado metálico del engranaje -->
    <linearGradient id="gearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A4F63"/>
      <stop offset="50%" stop-color="#353A4A"/>
      <stop offset="100%" stop-color="#242733"/>
    </linearGradient>

    <!-- Degradado del aro interior -->
    <linearGradient id="innerRingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C7CCD9"/>
    </linearGradient>
  </defs>

  <!-- Fondo tipo tarjeta redondeada -->
  <rect x="16" y="16" width="224" height="224" rx="56"
        fill="url(#bgGradient)"
        filter="url(#cardShadow)"/>

  <!-- Engranaje principal -->
  <g transform="translate(128 128) rotate(15)">
    <!-- Sombra suave del engranaje -->
    <circle r="64" fill="#000000" opacity="0.06"/>

    <!-- Dientes del engranaje -->
    <g fill="url(#gearGradient)">
      <!-- 8 dientes, cada uno rotado -->
      <rect x="-10" y="-88" width="20" height="28" rx="4"/>
      <rect x="-10" y="60"  width="20" height="28" rx="4" transform="rotate(180)"/>

      <rect x="-88" y="-10" width="28" height="20" rx="4" transform="rotate(0)"/>
      <rect x="60"  y="-10" width="28" height="20" rx="4" transform="rotate(180)"/>

      <rect x="-10" y="-88" width="20" height="28" rx="4" transform="rotate(45)"/>
      <rect x="-10" y="60"  width="20" height="28" rx="4" transform="rotate(225)"/>

      <rect x="-10" y="-88" width="20" height="28" rx="4" transform="rotate(90)"/>
      <rect x="-10" y="60"  width="20" height="28" rx="4" transform="rotate(270)"/>
    </g>

    <!-- Aro exterior del engranaje -->
    <circle r="56"
            fill="url(#gearGradient)"/>

    <!-- Aro interior claro (da sensación de mecanismo) -->
    <circle r="38"
            fill="url(#innerRingGradient)"
            stroke="#2E3445"
            stroke-width="3"/>

    <!-- Detalle circular central (no parece bombillo, sino eje) -->
    <circle r="16" fill="#2E3445"/>
    <circle r="8"  fill="#FFFFFF"/>
  </g>
</svg>
