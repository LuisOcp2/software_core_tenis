# =============================================
# TEMA LIGHT - ESTILO iOS (grises y alto contraste)
# Paleta de grises consistente y tonos de acento azul
# =============================================

# ---------- Paleta base gris ----------
@gray-00=rgb(255,255,255)
@gray-05=rgb(248,249,252)
@gray-10=rgb(242,244,248)
@gray-20=rgb(229,232,240)
@gray-30=rgb(214,217,224)
@gray-40=rgb(190,194,204)
@gray-50=rgb(142,142,147)
@gray-60=rgb(99,105,114)
@gray-70=rgb(40,44,52)
@gray-05-alpha=#0d000000
@gray-08-alpha=#14000000
@panelTint=#dce4f6e6

# Base de la app
@background=@gray-00
@foreground=@gray-70
@secondaryText=@gray-60
@tertiaryText=@gray-50

# =============================================
# PANELES Y TARJETAS
# =============================================
Panel.background=@panelTint
Panel.foreground=@foreground

Component.borderColor=@gray-50
Component.focusColor=rgb(0,122,255)
Component.focusWidth=2
Component.innerFocusWidth=0
Component.arc=8
Component.iconColor=@gray-00
Component.disabledIconColor=@gray-40

Separator.foreground=@gray-20
Separator.background=@gray-00

Popup.dropShadowPainted=true
Popup.dropShadowOpacity=0.08

# =============================================
# MEN? LATERAL (se mantiene azul oscuro)
# =============================================
Menu.background=rgb(22,42,72)
Menu.foreground=rgb(248,250,252)
Menu.lineColor=rgb(40,68,105)
Menu.arrowColor=@gray-20

Menu.lightdark.background=rgb(25,53,90)
Menu.lightdark.button.background=rgb(45,73,110)

Menu.title.foreground=rgb(160,170,180)

Menu.button.background=rgb(28,52,86)
Menu.button.selectedBackground=rgb(40,68,105)
Menu.button.selectedForeground=@gray-00
Menu.button.hoverBackground=rgb(34,60,95)
Menu.button.hoverForeground=@gray-00

Menu.ScrollBar.background=rgb(30,58,95)
Menu.ScrollBar.thumb=rgb(60,88,125)
Menu.ScrollBar.hoverThumbColor=rgb(80,108,145)

# =============================================
# LOGIN
# =============================================
Login.background=@gray-00

# =============================================
# TOAST/NOTIFICACIONES - Colores iOS
# =============================================
Toast.useEffect=false
Toast.background=@gray-00
Toast.foreground=@foreground
Toast.borderColor=@gray-30

Toast.success.background=rgb(220,252,231)
Toast.success.foreground=rgb(22,101,52)
Toast.success.outlineColor=rgb(52,199,89)

Toast.info.background=rgb(219,234,254)
Toast.info.foreground=rgb(30,64,175)
Toast.info.outlineColor=rgb(0,122,255)

Toast.warning.background=rgb(254,243,199)
Toast.warning.foreground=rgb(146,64,14)
Toast.warning.outlineColor=rgb(255,149,0)

Toast.error.background=rgb(254,226,226)
Toast.error.foreground=rgb(153,27,27)
Toast.error.outlineColor=rgb(255,59,48)

# =============================================
# COLORES DE ACENTO - iOS Blue
# =============================================
App.accent.default=rgb(10,132,255)
App.accent.blue=rgb(10,132,255)
App.accent.purple=rgb(175,82,222)
App.accent.red=rgb(255,59,48)
App.accent.orange=rgb(255,149,0)
App.accent.yellow=rgb(255,204,0)
App.accent.green=rgb(52,199,89)
App.action.create=rgb(46,125,50)
App.action.edit=rgb(21,101,192)
App.action.delete=rgb(198,40,40)
App.action.disable=rgb(69,90,100)

# =============================================
# TABLAS - Legibilidad m?xima
# =============================================
Table.background=@gray-05
Table.foreground=@secondaryText
Table.gridColor=@gray-30
Table.rowHeight=40
Table.showHorizontalLines=true
Table.showVerticalLines=false
Table.intercellSpacing=0,1
Table.alternateRowColor=@gray-10
Table.selectionBackground=rgb(34,119,230)
Table.selectionForeground=@gray-00
Table.selectionInactiveBackground=rgb(232,240,254)
Table.selectionInactiveForeground=@foreground
Table.hoverBackground=@gray-05
Table.hoverForeground=@foreground
Table.cellMargins=6,12,6,12

TableHeader.background=@gray-10
TableHeader.foreground=@secondaryText
TableHeader.separatorColor=@gray-30
TableHeader.bottomSeparatorColor=@gray-30
TableHeader.hoverBackground=@gray-05
TableHeader.font=$h4.font

Cell.focusBorderColor=rgb(0,122,255)
Cell.focusColor=rgb(0,122,255)

# =============================================
# BOTONES - Estados claros
# =============================================
Button.default.background=rgb(0,122,255)
Button.default.foreground=@gray-00
Button.default.hoverBackground=rgb(10,132,255)
Button.default.pressedBackground=rgb(0,112,245)
Button.default.borderWidth=0

Button.background=rgb(0,122,255)
Button.foreground=@gray-00
Button.iconColor=@gray-00
Button.disabledIconColor=@gray-40
Button.hoverBackground=rgb(10,132,255)
Button.pressedBackground=rgb(0,112,245)
Button.borderColor=rgb(0,122,255)
Button.borderWidth=1

Button.focusedBackground=rgb(0,122,255)
Button.focusedForeground=@gray-00
Button.focusedBorderColor=rgb(0,122,255)

Button.disabledBackground=@gray-05
Button.disabledForeground=@gray-40

# Ghost/terciario
Button.ghost.background=@gray-00
Button.ghost.hoverBackground=@gray-05
Button.ghost.pressedBackground=@gray-20
Button.ghost.borderColor=@gray-05-alpha

# =============================================
# CAMPOS DE TEXTO - Alto contraste
# =============================================
TextField.background=@gray-00
TextField.foreground=@foreground
TextField.inactiveForeground=@tertiaryText
TextField.placeholderForeground=@gray-40
TextField.borderColor=@gray-30
TextField.focusedBorderColor=rgb(0,122,255)
TextField.margin=8,12,8,12
TextField.arc=10
TextField.disabledBackground=@gray-05
TextField.disabledForeground=@tertiaryText

PasswordField.background=@gray-00
PasswordField.foreground=@foreground
PasswordField.borderColor=@gray-30
PasswordField.focusedBorderColor=rgb(0,122,255)
PasswordField.margin=8,12,8,12
PasswordField.arc=10

TextArea.background=@gray-00
TextArea.foreground=@foreground
TextArea.borderColor=@gray-30
TextArea.focusedBorderColor=rgb(0,122,255)
TextArea.margin=8,12,8,12
TextArea.arc=10

# =============================================
# COMBOBOX
# =============================================
ComboBox.background=@gray-00
ComboBox.foreground=@foreground
ComboBox.buttonBackground=@gray-00
ComboBox.borderColor=@gray-30
ComboBox.focusedBorderColor=rgb(0,122,255)
ComboBox.popupBackground=@gray-00
ComboBox.popupBorderColor=@gray-30
ComboBox.selectionBackground=rgb(232,240,254)
ComboBox.selectionForeground=rgb(0,122,255)
ComboBox.hoverBackground=@gray-05
ComboBox.buttonHoverBackground=@gray-05

# =============================================
# SCROLLBAR - Estilo macOS
# =============================================
ScrollBar.width=12
ScrollBar.trackArc=999
ScrollBar.thumbArc=999
ScrollBar.background=@background
ScrollBar.thumb=@gray-30
ScrollBar.hoverThumbColor=@gray-40
ScrollBar.pressedThumbColor=@gray-50
ScrollBar.track=@background

# =============================================
# SCROLLPANE
# =============================================
ScrollPane.background=@gray-05
ScrollPane.arc=8
TabbedPane.contentAreaColor=@gray-05

# =============================================
# TABBEDPANE - Estilo iOS
# =============================================
TabbedPane.selectedBackground=rgb(0,122,255)
TabbedPane.selectedForeground=@gray-00
TabbedPane.foreground=@secondaryText
TabbedPane.hoverColor=@gray-05
TabbedPane.underlineColor=rgb(0,122,255)
TabbedPane.tabHeight=44
TabbedPane.showTabSeparators=false
TabbedPane.contentBorderInsets=20,20,20,20

# =============================================
# PROGRESSBAR
# =============================================
ProgressBar.background=@gray-05
ProgressBar.foreground=rgb(0,122,255)
ProgressBar.arc=999
ProgressBar.trackArc=999

# =============================================
# CHECKBOX Y RADIOBUTTON - iOS Style
# =============================================
CheckBox.icon.checkmarkColor=@gray-00
CheckBox.icon.selectedBackground=rgb(0,122,255)
CheckBox.icon.selectedBorderColor=rgb(0,122,255)
CheckBox.icon.borderColor=@gray-30
CheckBox.icon.hoverBorderColor=rgb(0,122,255)
CheckBox.icon.focusedBorderColor=rgb(0,122,255)

RadioButton.icon.selectedBackground=rgb(0,122,255)
RadioButton.icon.selectedBorderColor=rgb(0,122,255)
RadioButton.icon.borderColor=@gray-30
RadioButton.icon.hoverBorderColor=rgb(0,122,255)
RadioButton.icon.focusedBorderColor=rgb(0,122,255)

# =============================================
# SPINNER
# =============================================
Spinner.background=@gray-00
Spinner.foreground=@foreground
Spinner.borderColor=@gray-30
Spinner.focusedBorderColor=rgb(0,122,255)
Spinner.buttonBackground=@gray-05
Spinner.buttonArrowColor=@secondaryText

# =============================================
# SLIDER
# =============================================
Slider.trackColor=@gray-30
Slider.thumbColor=rgb(0,122,255)
Slider.focusedColor=rgb(0,122,255)

# =============================================
# TOOLTIP
# =============================================
ToolTip.background=rgb(50,50,50)
ToolTip.foreground=@gray-00
ToolTip.borderColor=rgb(50,50,50)

# =============================================
# TREE
# =============================================
Tree.background=@gray-00
Tree.foreground=@foreground
Tree.selectionBackground=rgb(232,240,254)
Tree.selectionForeground=@foreground
Tree.selectionBorderColor=rgb(0,122,255)
Tree.hash=@gray-20

# =============================================
# LIST
# =============================================
List.background=@gray-00
List.foreground=@foreground
List.selectionBackground=rgb(232,240,254)
List.selectionForeground=@foreground
List.selectionInactiveBackground=@gray-05
List.selectionInactiveForeground=@foreground

# =============================================
# POPUPMENU
# =============================================
PopupMenu.background=@gray-00
PopupMenu.foreground=@foreground
PopupMenu.borderColor=@gray-30

MenuItem.background=@gray-00
MenuItem.foreground=@foreground
MenuItem.selectionBackground=rgb(232,240,254)
MenuItem.selectionForeground=@foreground

# =============================================
# MENUBAR
# =============================================
MenuBar.background=@gray-00
MenuBar.foreground=@foreground
MenuBar.borderColor=@gray-30

# =============================================
# OPCIONES ADICIONALES
# =============================================
AccentControl.show=false
Component.arc=8
Button.arc=8
TextComponent.arc=8
